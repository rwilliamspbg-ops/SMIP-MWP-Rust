name: Bench Harness

on:
  workflow_dispatch: {}
  push:
    tags: [ 'bench-*' ]

jobs:
  bench-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Ensure the workflow checks out the branch/ref that dispatched the run
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build bench (release)
        run: cargo build -p bench --release

      - name: Run bench harness
        run: ./tools/bench_harness/run_bench_harness.sh 20 bench_results.csv

      - name: Summarize results
        run: |
          python3 tools/bench_harness/summarize_csv.py bench_results.csv bench_summary.csv

      - name: Install plotting deps
        run: python3 -m pip install --upgrade pip && pip install matplotlib

      - name: Generate plots
        run: |
          python3 tools/bench_harness/plot_results.py || true

      - name: Commit plots back to branch
        if: always() && github.ref_type == 'branch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/bench_performance.png docs/bench_market_compare.png || true
          git commit -m "chore(bench): add generated performance plots" || true
          git push origin HEAD:"$TARGET_BRANCH" || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench_results.csv
            bench_summary.csv
            docs/bench_performance.png
            docs/bench_market_compare.png
