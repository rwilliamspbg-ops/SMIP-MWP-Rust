name: Bench Harness

on:
  workflow_dispatch: {}
  push:
    tags: [ 'bench-*' ]

jobs:
  bench-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Ensure the workflow checks out the branch/ref that dispatched the run
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build bench (release)
        run: cargo build -p bench --release

      - name: Run bench harness
        run: ./tools/bench_harness/run_bench_harness.sh 20 bench_results.csv

      - name: Summarize results
        run: |
          python3 tools/bench_harness/summarize_csv.py bench_results.csv bench_summary.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench_results.csv
            bench_summary.csv
